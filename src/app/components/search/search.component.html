<!--Search Container-->
<form role="search" class="relative w-full xs:w-full md:w-75 desktop:w-75">
    <label for="search-input" class="sr-only">Search Content</label>
    <!--Icon-->
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <img src="image/search.svg" alt="Search Icon" class="size-4">
    </div>
    <!--Inputa area-->
    <input 
        type="search" 
        id="search-input"
        placeholder=" " 
        class="w-full h-10 bg-section-bg rounded-lg pl-12 pr-4 text-base text-text-main focus:outline-none focus:ring-2 focus:ring-black/50 transition-all border-none"
    >
</form>
